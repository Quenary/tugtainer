<div class="auth">
  <app-logo class="logo"></app-logo>
  @if (isPasswordEnabled.value()) {
    @if (isPasswordSet.value()) {
      <app-auth-form
        [isLoading]="isLoading()"
        (OnSubmit)="onSubmitLogin($event)">
      </app-auth-form>
    } @else {
      <app-new-password-form
        [isLoading]="isLoading()"
        (OnSubmit)="onSubmitNewPassword($event)"></app-new-password-form>
    }
  }

  @if (showDivider()) {
    <p-divider></p-divider>
  }

  @if (isOidcEnabled.value()) {
    <p-button
      class="oidc-button"
      [fluid]="true"
      [loading]="isLoading()"
      severity="primary"
      icon="pi pi-id-card"
      [label]="'AUTH.SIGNIN_WITH_OIDC' | translate"
      (onClick)="onOidcLogin()">
    </p-button>
  }
</div>
