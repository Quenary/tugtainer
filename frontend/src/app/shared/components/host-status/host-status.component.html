@if (host(); as h) {
  @if (h.status; as s) {
    @switch (s.ok) {
      @case (true) {
        <p-tag severity="success">
          {{ 'HOSTS.TABLE.STATUS_OK' | translate }}
        </p-tag>
      }
      @case (false) {
        <p-tag
          severity="danger"
          [pTooltip]="s.err">
          {{ 'HOSTS.TABLE.STATUS_ERROR' | translate }}
        </p-tag>
      }
    }
  } @else if (h.enabled) {
    <p-skeleton></p-skeleton>
  }
}
