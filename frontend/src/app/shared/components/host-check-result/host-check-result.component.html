@if (result(); as res) {
  <h3>
    {{ res.host_name }}
  </h3>

  <section class="results">
    @for (item of res.items; track item.container.Id) {
      <div class="results-item">
        <span>{{ item.container.Name }}</span>
        <p-tag
          [severity]="ContainerCheckResultSeverity[item.result] ?? 'contrast'">
          {{ item.result }}
        </p-tag>
      </div>
    }
  </section>

  @if (res.prune_result) {
    <pre>
    {{ res.prune_result }}
   </pre
    >
  }
}
