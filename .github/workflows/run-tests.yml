name: Run Tests

on:
  workflow_dispatch:
  pull_request:

jobs:
  frontend-tests:
    name: Run Frontend Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install frontend dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:ci

  backend-tests:
    name: Run Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - uses: ./.github/actions/setup-python-env

      - name: Run pytest
        run: python -m pytest

  backend-lint:
    name: Run Backend Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - uses: ./.github/actions/setup-python-env

      - name: Run Ruff
        run: ruff check agent backend shared

  backend-typechecks:
    name: Run Backend Typechecks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - uses: ./.github/actions/setup-python-env

      - name: Run Mypy
        run: mypy agent backend shared