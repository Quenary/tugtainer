[project]
name = "tugtainer"
version = "1.29.1"
description = "An application for automating docker containers updates with a web ui"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "aiocron>=2.1",
    "aiohttp>=3.13.3",
    "aiosqlite>=0.22.1",
    "alembic>=1.18.1",
    "apprise>=1.9.5",
    "bcrypt>=5.0.0",
    "cachetools>=6.2.4",
    "cachetools-async>=0.0.5",
    "dotenv>=0.9.9",
    "fastapi>=0.128.0",
    "jinja2>=3.1.6",
    "packaging>=25.0",
    "paho-mqtt>=2.1.0",
    "python-jose>=3.5.0",
    "python-on-whales>=0.80.0",
    "uvicorn>=0.40.0",
]

[dependency-groups]
dev = [
    "fastapi-cli>=0.0.20",
    "fastapi[standard]>=0.128.0",
    "mypy>=1.20.2",
    "pytest>=9.0.2",
    "pytest-asyncio>=1.3.0",
    "pytest-mock>=3.15.1",
    "ruff>=0.15.11",
    "uvicorn[standard]>=0.40.0",
    "watchfiles>=1.1.1",
    "websockets>=15.0.1",
]

[tool.uv]
package = false

[tool.semantic_release]
version_toml = ["pyproject.toml:project.version"]
build_command = """
    pip install uv~=0.9
    uv lock --upgrade-package "$PACKAGE_NAME"
    git add uv.lock
"""
commit_parser = "conventional"
commit_message = "chore(release): {version}\n\nAutomatically generated by python-semantic-release"
major_on_zero = true
version_variable = []
upload_to_pypi = false
upload_to_repository = false
commit_version_number = false
tag_format = "v{version}"

[semantic_release.commit_parser_options]
minor_tags = ["feat"]
patch_tags = ["fix", "perf"]
other_allowed_tags = ["build", "chore", "ci", "docs", "style", "refactor", "test"]
allowed_tags = ["feat", "fix", "perf", "build", "chore", "ci", "docs", "style", "refactor", "test"]
default_bump_level = 0
parse_squash_commits = true
ignore_merge_commits = true

[tool.semantic_release.changelog.default_templates]
changelog_file = "CHANGELOG.md"
output_format = "md"

[tool.semantic_release.changelog]
# Recommended patterns for conventional commits parser that is scope aware
exclude_commit_patterns = [
    '''chore(?:\([^)]*?\))?: .+''',
    '''ci(?:\([^)]*?\))?: .+''',
    '''refactor(?:\([^)]*?\))?: .+''',
    '''style(?:\([^)]*?\))?: .+''',
    '''test(?:\([^)]*?\))?: .+''',
    '''build\((?!deps\): .+)''',
    '''Initial [Cc]ommit.*''',
]
mode = "init"

[tool.ruff]
target-version = "py313"

lint.select = [
  "E",   # pycodestyle errors
  "F",   # pyflakes
  "I",   # import sorting
  "B",   # bugbear
  "UP",  # pyupgrade
]

lint.ignore = [
  "E501",  # line too long (если используешь formatter)
  "B008",  # Checks for function calls in default function arguments
]


[tool.mypy]
ignore_missing_imports = true
no_strict_optional = true

[[tool.mypy.overrides]]
module = "cachetools.*"
ignore_missing_imports = true
